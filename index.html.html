<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        /* --- 全局样式 --- */
        :root {
            --primary-color: #3498db; /* 主色调：蓝色 */
            --secondary-color: #2c3e50; /* 深色背景 */
            --text-color: #333;
            --bg-color: #f4f4f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* --- 导航栏 --- */
        header {
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a:hover {
            color: var(--primary-color);
            transition: 0.3s;
        }

        /* --- 首屏 Hero 区域 --- */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://source.unsplash.com/random/1920x1080/?nature,water');
            background-size: cover;
            background-position: center;
            height: 100vh; /* 占满全屏高度 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        /* --- 内容区域 --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            text-align: center;
            margin-bottom: 3rem;
            color: var(--secondary-color);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        /* --- 页脚 --- */
        footer {
            background: var(--secondary-color);
            color: #fff;
            text-align: center;
            padding: 2rem;
            margin-top: auto;
        }

        /* --- 响应式调整 --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .nav-links { display: none; } /* 手机端暂时隐藏菜单 */
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <header>
        <nav>
            <div class="logo">MyWebsite</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </nav>
    </header>

    <!-- 首屏区域 -->
    <section id="home" class="hero">
        <h1>欢迎来到我的网站</h1>
        <p>这是一个简洁、现代且响应式的网页模板。您可以使用它来展示您的作品、产品或个人博客。</p>
        <a href="#services" class="btn" onclick="sayHello()">了解更多</a>
    </section>

    <!-- 内容展示区 -->
    <section id="services" class="container">
        <h2 class="section-title">我们的特色服务</h2>
        <div class="cards">
            <div class="card">
                <h3>🚀 快速开发</h3>
                <p>使用最新的技术栈，确保您的网页加载速度飞快，用户体验极佳。</p>
            </div>
            <div class="card">
                <h3>📱 响应式设计</h3>
                <p>无论是在电脑、平板还是手机上，您的网页都能完美自适应显示。</p>
            </div>
            <div class="card">
                <h3>🎨 现代美学</h3>
                <p>简约而不简单的设计风格，让您的内容更加突出，视觉更加舒适。</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer id="contact">
        <p>Copyright &copy; 2023 MyWebsite. All Rights Reserved.</p>
        <p>联系我们：email@example.com</p>
    </footer>

    <script>
        // 简单的 JavaScript 交互
        function sayHello() {
            console.log("按钮被点击了！");
            // 这里可以添加更多逻辑，比如弹窗
            // alert("欢迎浏览更多内容！"); 
        }

        // 平滑滚动效果
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
